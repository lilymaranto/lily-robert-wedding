<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Add to Apple Calendar — Lily &amp; Robert</title>
  <link rel="alternate" type="text/calendar" href="/wedding.ics" title="Lily and Robert's Wedding">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
      background: #0f4d66;
      color: #f0f9fb;
      font-family: Georgia, 'Times New Roman', serif;
      text-align: center;
    }
    .card {
      max-width: 360px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.06em;
    }
    p {
      margin: 0 0 24px;
      font-size: 15px;
      line-height: 1.5;
      color: #d4eef8;
    }
    a.btn {
      display: inline-block;
      padding: 16px 28px;
      background: #baeefb;
      color: #1a4a57;
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Lily &amp; Robert's Wedding</h1>
    <p>April 15–22, 2028<br>Roatán, Honduras</p>
    <a class="btn" id="add" href="https://lily-robert-wedding.vercel.app/wedding.ics">Add to Apple Calendar</a>
  </div>
  <script>
    (function () {
      var icsUrl = 'https://lily-robert-wedding.vercel.app/wedding.ics';
      var add = document.getElementById('add');
      if (add) add.href = icsUrl;
      if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
        window.location.replace(icsUrl);
      }
    })();
  </script>
</body>
</html>
